<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">

  <g transform="translate(100,150)">
    <rect width="700" height="600" rx="40" fill="#222"/>

    <g fill="#555">
      <!-- 6 rows × 7 columns -->

      <!-- row 0 -->
      <circle cx="50" cy="550" r="40"/>
      <circle cx="150" cy="550" r="40"/>
      <circle cx="250" cy="550" r="40"/>
      <circle cx="350" cy="550" r="40"/>
      <circle cx="450" cy="550" r="40"/>
      <circle cx="550" cy="550" r="40"/>
      <circle cx="650" cy="550" r="40"/>

      <!-- row 1 -->
      <circle cx="50" cy="450" r="40"/>
      <circle cx="150" cy="450" r="40"/>
      <circle cx="250" cy="450" r="40"/>
      <circle cx="350" cy="450" r="40"/>
      <circle cx="450" cy="450" r="40"/>
      <circle cx="550" cy="450" r="40"/>
      <circle cx="650" cy="450" r="40"/>

      <!-- row 2 -->
      <circle cx="50" cy="350" r="40"/>
      <circle cx="150" cy="350" r="40"/>
      <circle cx="250" cy="350" r="40"/>
      <circle cx="350" cy="350" r="40"/>
      <circle cx="450" cy="350" r="40"/>
      <circle cx="550" cy="350" r="40"/>
      <circle cx="650" cy="350" r="40"/>

      <!-- row 3 -->
      <circle cx="50" cy="250" r="40"/>
      <circle cx="150" cy="250" r="40"/>
      <circle cx="250" cy="250" r="40"/>
      <circle cx="350" cy="250" r="40"/>
      <circle cx="450" cy="250" r="40"/>
      <circle cx="550" cy="250" r="40"/>
      <circle cx="650" cy="250" r="40"/>

      <!-- row 4 -->
      <circle cx="50" cy="150" r="40"/>
      <circle cx="150" cy="150" r="40"/>
      <circle cx="250" cy="150" r="40"/>
      <circle cx="350" cy="150" r="40"/>
      <circle cx="450" cy="150" r="40"/>
      <circle cx="550" cy="150" r="40"/>
      <circle cx="650" cy="150" r="40"/>

      <!-- row 5 -->
      <circle cx="50" cy="50" r="40"/>
      <circle cx="150" cy="50" r="40"/>
      <circle cx="250" cy="50" r="40"/>
      <circle cx="350" cy="50" r="40"/>
      <circle cx="450" cy="50" r="40"/>
      <circle cx="550" cy="50" r="40"/>
      <circle cx="650" cy="50" r="40"/>
